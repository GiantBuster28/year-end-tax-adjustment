# Production override — apply with:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  frontend:
    restart: always
    volumes: []  # no hot-reload in production
    environment:
      - VITE_API_URL=${VITE_API_URL:-https://example.com}

  bff:
    restart: always
    environment:
      - PORT=4000
      - API_URL=${API_URL:-http://api:8000}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET}
    # build production image (tsc compiled)
    command: node dist/index.js

  api:
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-tax-attachments}
    # remove --reload in production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  db:
    restart: always
    ports: []  # do not expose DB port in production
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-tax_adjustment}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  redis:
    restart: always
    ports: []  # do not expose Redis port in production

  minio:
    restart: always
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    ports:
      - '9000:9000'
      # console not exposed publicly
    # healthcheck for production readiness
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - bff

  mailhog:
    profiles:
      - dev  # exclude mailhog from production by default
